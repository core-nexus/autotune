version: 2
updates:
  # The only dependency ecosystem in this repo is the third-party GitHub
  # Actions referenced by the workflows. Dependabot keeps those actions up to
  # date; when an action is pinned to a commit SHA it bumps both the SHA and
  # its trailing version comment.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "auto-review"
