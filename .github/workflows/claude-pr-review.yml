name: Claude PR Review

# Two-stage pipeline: review → fix (if needed).
# Triggers: PR events (auto), /claude-review (manual review), /claude-fix (manual fix).

on:
  pull_request:
    types:
      - ready_for_review
      - opened
    # Docs/text-only PRs have nothing to review or fix — skip to save cost.
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'docs/**'
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# MAXIMUM_FIX_PRIORITY is the MINIMUM review severity at which the fix stage
# runs automatically. Findings below it are left for a human (or a manual
# /claude-fix). Valid values: HIGH, MEDIUM, LOW, XLOW. Default LOW = fix
# anything worth fixing; raise to MEDIUM/HIGH to auto-fix only the serious stuff.
env:
  MAXIMUM_FIX_PRIORITY: LOW

jobs:
  # ─── Stage 1: Review ───────────────────────────────────────────────────────
  review:
    # Run on PR events (not dependabot), or on "/claude-review" comments on PRs.
    # The author_association gate on the comment branch stops a fork-PR author
    # from triggering a review+fix run with full repo secrets on their own diff.
    if: |
      (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && !endsWith(github.actor, '[bot]') && contains(github.event.comment.body, '/claude-review') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    outputs:
      priority: ${{ steps.check-followup.outputs.priority }}
      should_fix: ${{ steps.check-followup.outputs.should_fix }}
      threshold: ${{ steps.check-followup.outputs.threshold }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: PR Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: >-
            --dangerously-skip-permissions
            --model opus
            --append-system-prompt "If a CLAUDE.md file exists at the repo root, read and internalize it before reviewing. It contains the project's coding standards and conventions. Treat it as authoritative."

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            You are an adversarial reviewer of this pull request. If a CLAUDE.md
            exists, read it first — it is authoritative for this project.

            ## Mindset: assume the diff is guilty until proven correct

            A rubber-stamp review is a failed review. Your job is to find the bugs
            the author missed, not to confirm the code looks fine. For the changed
            code:

            - **Trace the real data flow.** Read the actual functions the diff
              calls and is called by — don't judge a hunk in isolation. Many bugs
              only appear at the seam between the new code and what it touches.
            - **Hunt for the concrete failure.** For each suspected issue, try to
              name a specific input, state, or sequence of events that produces
              wrong behavior. Think about the adversarial and boundary cases the
              happy-path author didn't: empty/null, zero, negative, huge,
              duplicate, concurrent, out-of-order, retried, malicious.
            - **Assume an attacker and a flaky network.** Every external call can
              time out, fail, or be replayed. Every user input can be hostile.
              Every operation can run twice.

            ## Discipline: report real defects, not nitpicks (avoid the kitchen sink)

            This is a hardcore review of the **important** things — not a style
            sweep. Two classes of finding, and you must label each one:

            - **[CONFIRMED]** — you can state the concrete input/state/sequence that
              triggers wrong behavior and what the correct behavior is. These are
              the ONLY findings that drive fix priority (MEDIUM/HIGH).
            - **[SUSPECTED]** — looks wrong but you can't prove it from the diff
              (intent ambiguous, context you can't see). Report it for the human,
              but it does NOT raise the priority. When in doubt, use SUSPECTED — a
              false CONFIRMED that triggers an automated code change is worse than a
              missed nit.

            Do not pad the review with trivia. Cosmetic preferences, subjective
            renames, and "you could also" ideas are noise here — skip them or keep
            them to a single XLOW line. Only comment on what actually appears in the
            changed code; skip focus areas this PR doesn't touch.

            ## Focus areas — go deep where the diff lands

            1. **Correctness & Logic** (the core of an adversarial review)
               - Inverted/incorrect conditions (`&&` vs `||`, a missing `!`,
                 wrong comparison operator, null-check in the wrong order)
               - Off-by-one and boundary errors; empty-collection and
                 single-element cases
               - Copy-paste variable errors (`a` used where `b` was meant),
                 wrong argument order, destructured field that doesn't exist
               - `.find()`/lookup results used without an undefined check
               - Missing `await` on a promise whose result or error matters;
                 fire-and-forget where completion is required
               - Race conditions: operations assumed sequential that run
                 concurrent; double-submit / double-click firing a mutation twice
               - Data transforms that silently drop fields; merges/spreads that
                 override important values; wrong units or formulas

            2. **Security & Authorization**
               - Endpoints/functions that read or mutate user data verify identity
                 AND ownership — a user cannot reach another user's records
               - Admin-only paths enforce admin; internal-only functions aren't
                 exposed publicly
               - No raw string interpolation into SQL/queries/commands/HTML
                 (injection, XSS); user input validated and sanitized
               - Webhook handlers verify signatures; server-side URL fetches are
                 validated (SSRF)
               - No secrets in code; no logging of tokens/PII/credentials
               - Environment/mode detection is fail-closed (unknown = production)

            3. **Error Handling — loud in both directions**
               - The Cardinal Sin: `catch (_e) {}`, `.catch(() => {})`, or a catch
                 that only `console.warn`s / returns null without reporting — hides
                 bugs. Flag every instance.
               - The Mirror Sin: a **real, actionable** error muffled — a
                 misconfiguration or missing env var routed to a silent path, or an
                 expected-error allowlist / `beforeSend` entry that isn't a benign
                 per-user outcome. Misconfig and missing-env-var MUST alert.
               - Backend: prefer throwing; use structured error types
                 (`RATE_LIMITED`, `NOT_FOUND`) for cases the client must distinguish
               - Frontend: graceful degradation is fine, but always report to the
                 error service AND tell the user

            4. **Resilience & Idempotency** (when the diff touches external calls,
               money, entitlements, webhooks, or retries)
               - Idempotency keys are a **pure function of the operation's
                 identity** — never seeded with `Date.now()`, a UUID, randomness,
                 or an attempt counter (a retry would mint a new key and double-act)
               - Webhook / retried handlers are idempotent — a redelivery no-ops,
                 doesn't double-charge / double-grant / double-email
               - Every outbound network call has a timeout; retries are bounded and
                 use backoff (ideally jitter), never an unbounded loop
               - Expensive operations (AI/media/generation) have a cost cap or
                 circuit breaker so a runaway bug can't produce a runaway bill

            5. **Performance & Scale**
               - N+1 query patterns; queries that full-scan a growing table
               - "Load all" of an unbounded/growing collection instead of
                 paginating; unbounded payload sizes
               - Rate limits and quotas enforced server-side, not bypassable

            6. **Testing (no mocks of our own code)**
               - New logic and every bug fix need a test that would fail without
                 the change and exercises the REAL code path
               - NEVER mock internal modules — only external boundaries (`fetch`,
                 third-party SDKs). An internal mock is a finding.
               - Assertions are meaningful, not `toBeDefined()` theater; deleting
                 or weakening a test to go green is a finding

            7. **Documentation Accuracy**
               - Docs/comments that the diff made stale (reference removed or
                 renamed code); new public APIs lacking a clear description

            ---

            Format: Provide all feedback in a single comment with numbered items.
            Do NOT prefix numbers with `#` (GitHub treats that as issue links).
            For each item, give: the file and line, the **[CONFIRMED]** or
            **[SUSPECTED]** label, what is wrong, and — for CONFIRMED items — the
            concrete failing scenario (input/state → wrong result). Prioritize by
            severity, most severe first. If, after a genuine adversarial pass, the
            diff is clean, say so plainly rather than inventing findings.

            ## REQUIRED: Maximum Fix Priority

            After all review items, you MUST end your review with a maximum fix
            priority assessment. **Only [CONFIRMED] findings set this priority** —
            [SUSPECTED] items never raise it above LOW.

            Values:
            - NONE — No issues need code changes. PR is good to merge as-is.
            - XLOW — Only trivial nits not worth an automated fix cycle.
            - LOW — Minor issues, or only [SUSPECTED] findings, worth a look but
              not blocking merge.
            - MEDIUM — A CONFIRMED real issue (missing error handling, a logic bug
              in an uncommon path, missing tests for new logic) to fix.
            - HIGH — A CONFIRMED critical issue: security/auth bypass, data leak,
              broken core logic, double-charge/double-grant, or a muffled
              actionable alert.

            You MUST end your review with EXACTLY one of these on its own line:

            MAXIMUM_FIX_PRIORITY:NONE
            MAXIMUM_FIX_PRIORITY:XLOW
            MAXIMUM_FIX_PRIORITY:LOW
            MAXIMUM_FIX_PRIORITY:MEDIUM
            MAXIMUM_FIX_PRIORITY:HIGH

      - name: Check follow-up priority
        id: check-followup
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          # The action's execution transcript is the most reliable source for
          # the just-posted priority (no comments-API propagation race).
          EXECUTION_FILE: ${{ steps.review.outputs.execution_file }}
          MAXIMUM_FIX_PRIORITY: ${{ env.MAXIMUM_FIX_PRIORITY }}
        run: .github/workflows/scripts/extract-pr-review-priority.sh

  # ─── Stage 2: Fix (only if review found issues worth fixing) ────────────────
  fix-review-issues:
    needs: review
    # Run after review if it cleared the MAXIMUM_FIX_PRIORITY threshold, or
    # directly on a "/claude-fix" comment.
    if: |
      always() && (
        (needs.review.result == 'success' && needs.review.outputs.should_fix == 'true') ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request && !endsWith(github.actor, '[bot]') && contains(github.event.comment.body, '/claude-fix') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fix review issues
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: >-
            --dangerously-skip-permissions
            --model opus
            --max-turns 250
            --append-system-prompt "If a CLAUDE.md file exists at the repo root, read and internalize it before starting work. It contains the project's coding standards and conventions. Treat it as authoritative."

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
            REVIEW FOLLOW-UP PRIORITY: ${{ needs.review.outputs.priority || 'MANUAL' }}
            MAXIMUM_FIX_PRIORITY (threshold): ${{ env.MAXIMUM_FIX_PRIORITY }}

            ## CRITICAL INSTRUCTION: YOU ARE A FIXER, NOT A REVIEWER

            Your ONLY job is to **edit code, commit changes, and push fixes**.
            You must NOT write a review. You must NOT post a comment listing
            issues. If you finish without making any git commits, you have FAILED.

            **Your output is CODE CHANGES, not commentary.**

            ## Step 1: Read the review and understand EVERY issue (MANDATORY)

            **THIS IS YOUR PRIMARY INPUT. DO NOT SKIP THIS STEP.**

            Read ALL comments on this PR, especially from the code review.
            The review contains numbered findings with severity levels.
            You MUST fix every issue rated at or above the fix threshold
            MAXIMUM_FIX_PRIORITY (${{ env.MAXIMUM_FIX_PRIORITY }}).

            **How to read the review:**
            a) Use `gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments"` to fetch all PR comments.
            b) Look for the review comment with numbered findings.
            c) For EACH finding rated at or above the threshold
               (${{ env.MAXIMUM_FIX_PRIORITY }}), understand what file and line
               it refers to, what the problem is, and what the fix should be.

            **CRITICAL: "CI is green" does NOT mean the review is addressed.**
            The review found problems that CI cannot detect. You MUST fix review
            findings even when CI is green.

            ## Step 2: Gather additional context

            a) **CI check failures** — run `gh pr checks $PR_NUMBER`. If any failed,
               read their logs.
            b) **Run quality gates yourself** — the project's lint, type check,
               and test commands. Fix any failures first.
            c) **The PR diff itself** — read the changed files for obvious bugs.

            ## Step 3: Fix everything

            **Make actual code changes.** Edit files. Write new test cases.

            Rules:
            - **Do NOT skip hard fixes.**
            - **Tests are MANDATORY** if the review flagged missing tests.
            - **Fix tests correctly.** NEVER delete or skip a test to make CI green.
            - **Priority order:** security > correctness > performance > tests > style.

            ## Step 4: Verify quality gates pass locally

            Run the project's lint, type check, and test commands.
            Do NOT push until all pass.

            ## Step 5: Commit and push

            - Each commit explains what was fixed and why.
            - Push your commits to the PR branch.

            ## Step 6: WAIT FOR CI AND FIX UNTIL GREEN (CRITICAL)

            After pushing, monitor CI and iterate until ALL checks pass (max 3 iterations).

            ## Formatting rule

            In commit messages and PR comments, NEVER use `#` followed by a number.
            Use `item 1`, `item 3`, or `1.`, `3.` instead.

            ## REMINDER — SUCCESS CRITERIA (ALL THREE REQUIRED)

            1. You read the review and fixed every finding rated LOW or above
            2. You pushed code fixes (not reviews or comments)
            3. ALL CI checks are green
